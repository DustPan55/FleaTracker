<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f5d50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flea Tracker" />
  <title>🐾 Flea &amp; Tick Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css?v=3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232f5d50'/><text y='.92em' x='8' font-size='78'>🐾</text></svg>" />
</head>
<body>
  <header class="app-header">
    <h1>🐾 Flea &amp; Tick Tracker</h1>
    <p class="sub">When &amp; what each dog last took — and what's due</p>
  </header>

  <main>
    <!-- Dashboard: one card per dog -->
    <section id="dashboard" class="dashboard">
      <div class="loading">Loading dogs…</div>
    </section>

    <!-- Add treatment -->
    <section class="card form-card">
      <h2 id="form-title">➕ Log a treatment</h2>
      <form id="treatment-form">
        <div class="row">
          <label>Dog
            <select id="f-dog" required></select>
          </label>
          <label>Date given
            <input type="date" id="f-date" required />
          </label>
        </div>
        <div class="row">
          <label>Product
            <select id="f-product" required></select>
          </label>
          <label>Repeat every (days)
            <input type="number" id="f-interval" min="0" inputmode="numeric" placeholder="e.g. 30" />
          </label>
        </div>
        <div class="row">
          <label>Dog weight (lbs) <span class="opt">(optional)</span>
            <input type="number" id="f-weight" min="0" step="0.1" inputmode="decimal" placeholder="e.g. 55" />
          </label>
          <label>Dosage <span class="opt">(by weight band)</span>
            <select id="f-dosage"></select>
          </label>
        </div>
        <div class="row" id="custom-dose-row" hidden>
          <label>Custom dosage
            <input type="text" id="f-dose" placeholder="type the dose / size" />
          </label>
        </div>
        <div class="row">
          <label>Notes <span class="opt">(optional)</span>
            <input type="text" id="f-notes" placeholder="anything to remember" />
          </label>
        </div>
        <p class="disclaimer">⚠️ Dosages are a general weight-band guide — always confirm against the product label or your vet before giving.</p>
        <button type="submit" id="f-submit">Save treatment</button>
        <button type="button" id="f-cancel" class="btn-ghost" hidden>Cancel</button>
        <span id="form-msg" class="form-msg"></span>
      </form>
    </section>

    <!-- Inventory -->
    <section class="card" id="inventory-card">
      <div class="history-head">
        <h2>📦 Inventory</h2>
        <button type="button" id="inv-add-btn" class="btn-ghost">+ Add stock</button>
      </div>
      <form id="inv-form" hidden>
        <div class="row">
          <label>Product
            <select id="i-product" required></select>
          </label>
          <label>Dosage / band <span class="opt">(optional)</span>
            <select id="i-dosage"></select>
          </label>
        </div>
        <div class="row">
          <label>Units per box
            <input type="number" id="i-qty" min="1" inputmode="numeric" placeholder="e.g. 6" required />
          </label>
          <label>Cost per box ($) <span class="opt">(optional)</span>
            <input type="number" id="i-cost" min="0" step="0.01" inputmode="decimal" placeholder="e.g. 89.99" />
          </label>
        </div>
        <div class="row">
          <label>Boxes bought <span class="opt">(total)</span>
            <input type="number" id="i-boxes" min="0" step="1" value="1" inputmode="numeric" />
          </label>
          <label>Alert when ≤
            <input type="number" id="i-threshold" min="0" step="1" value="1" inputmode="numeric" />
          </label>
        </div>
        <button type="submit" id="i-submit">Save stock</button>
        <button type="button" id="i-cancel" class="btn-ghost">Cancel</button>
        <span id="inv-msg" class="form-msg"></span>
      </form>
      <div id="inventory" class="inv-list"><div class="loading">Loading…</div></div>
    </section>

    <!-- History -->
    <section class="card">
      <div class="history-head">
        <h2>📋 History</h2>
        <select id="history-filter"><option value="">All dogs</option></select>
      </div>
      <div id="history" class="history"><div class="loading">Loading…</div></div>
    </section>
  </main>

  <footer class="app-footer">
    <span id="status-dot" class="dot"></span><span id="status-text">connecting…</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
